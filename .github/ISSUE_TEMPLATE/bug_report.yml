name: 🐛 Bug report
description: Something in iw7x isn't working
title: "[Bug] <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `python3 neoz.py ...`
        2. Select ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Output / error message
      render: shell
  - type: input
    id: os
    attributes:
      label: OS & version
      placeholder: Kali Linux 2026.1 / WSL2 Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
