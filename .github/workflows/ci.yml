name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      IW7X_NO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Validate catalog.json
        run: |
          python -c "import json; d=json.load(open('catalog.json', encoding='utf-8')); n=sum(len(c.get('tools',[])) for c in d['categories']); print(f'catalog OK — {len(d[\"categories\"])} categories, {n} tools')"

      - name: Import smoke test
        run: python -c "import neoz, neoz.cli, neoz.models, neoz.system, neoz.ui, neoz.updater, neoz.bundles"

      - name: Unit tests
        run: pytest -q

      - name: CLI runs
        run: |
          python neoz.py --help
          python neoz.py list
          python neoz.py bundles

  lint:
    name: Lint (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff
        run: |
          pip install ruff
          ruff check neoz --output-format=github || true
